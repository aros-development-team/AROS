# Publishes verified nightly build uploads and cleans up the uploads area
# on the aros project web space.
# Requires secrets:
# - SF_RSYNC_USER
#
# The verify/publish/cleanup logic lives in templates/nightlies-update.yml
# (shared with update-dev-nightlies.yml); this pipeline just points it at
# the aros project directories.

trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

steps:
- template: templates/setup-sf-ssh.yml
  parameters:
    displayName: 'Setup SSH Key for SourceForge'

- template: templates/nightlies-update.yml
  parameters:
    uploadsDir: '/home/project-web/aros/uploads/nightly2'
    frsDir: '/home/project-web/aros/frs/nightly2'
    downloadsDir: '/home/project-web/aros/htdocs/downloads/nightly2'
    displayName: 'Run Nightly Build Update'
