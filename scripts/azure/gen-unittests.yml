# Update unittests.html based on remote unit test files
# Requires secrets:
# - SF_RSYNC_USER
#
# NOTE: SourceForge has discontinued interactive/remote-command shell
# access (shell.sourceforge.net). Their file-management host
# (web.sourceforge.net) still supports SFTP/SCP/rsync-over-SSH, so this
# pipeline now does everything through rsync (file listing, download,
# upload) and never runs a remote command over ssh. All logic is
# inlined below so the pipeline has no dependency on scripts living
# elsewhere in the repo.

trigger:
- master

schedules:
- cron: "15 */6 * * *"    # Every 6 hours
  branches:
    include:
    - master
  always: true
  batch: false
  displayName: Every 6 hours

pool:
  vmImage: 'ubuntu-latest'

variables:
  PROJWEBDIR: '/home/project-web/arosdev/htdocs'
  REMOTE_UNITTETS_DIR: '/home/project-web/arosdev/htdocs/unittests'
  SF_HOST: 'web.sourceforge.net'

steps:

- task: DownloadSecureFile@1
  name: GetSSHKey
  inputs:
    secureFile: 'sf-azure-key'

- bash: |
    echo "Setting up SSH key..."
    mkdir -p ~/.ssh
    cp "$(GetSSHKey.secureFilePath)" ~/.ssh/id_rsa
    chmod 600 ~/.ssh/id_rsa
    chmod 700 ~/.ssh

    ssh-keyscan -t rsa $(SF_HOST) >> ~/.ssh/known_hosts

    echo "Host $(SF_HOST)" > ~/.ssh/config
    echo "    IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
    echo "    IdentitiesOnly yes" >> ~/.ssh/config
    echo "    StrictHostKeyChecking yes" >> ~/.ssh/config
    echo "    Port 22" >> ~/.ssh/config
    chmod 600 ~/.ssh/config

    echo "SSH key and config setup complete."
  displayName: 'Setup SSH Key and SSH Config for SourceForge'

- bash: |
    set -e

    echo "Fetch remote unittest file list (via rsync --list-only, no shell command)..."
    rsync --list-only -e "ssh -o StrictHostKeyChecking=yes" \
      "$(SF_RSYNC_USER)"@$(SF_HOST):"$(REMOTE_UNITTETS_DIR)"/ \
      | awk '$1 !~ /^d/ {print $NF}' \
      | grep -E -- '-[0-9]{8}-unittests\.html$' \
      | sort > unittest_file_list.txt

    echo "Found $(wc -l < unittest_file_list.txt) remote unittest files."

    echo "Fetch current unittests.html..."
    rsync -e "ssh -o StrictHostKeyChecking=yes" \
      "$(SF_RSYNC_USER)"@$(SF_HOST):$(PROJWEBDIR)/unittests.html .

    echo "Run local unittest html update script..."
    cat > update_html.py <<'PYEOF'
    import argparse
    import re


    def main():
        parser = argparse.ArgumentParser(description="Update htmlfile with new unittest list")
        parser.add_argument('--filelist', required=True, help='Path to file containing unittest file list')
        parser.add_argument('--htmlfile', required=True, help='Path to the unittests.html file to update')
        args = parser.parse_args()

        with open(args.filelist, 'r', encoding='utf-8') as f:
            results = [line.strip() for line in f if line.strip()]

        activepage = '/unittests/' + results[0] if results else ''

        options = '\n'.join(
            f'    <option value="{r}">{r[:-15]}</option>' for r in results
        )

        new_content = f'''
    <h1>Unit Test Results<br><img style="width: 238px; height: 2px;" alt="spacer" src="/images/sidespacer.png"></h1>

    <select name="unittests" id="unittests" onchange="show_unittests(this.value)">
    {options}
    </select>

    <object style="float:left;height:100%;" width="100%" height="95vh" id="displayedtest" data="{activepage}" type="text/html"></object>

    <script type="text/javascript">
      function show_unittests(unittest) {{
        document.getElementById("displayedtest").data = "/unittests/" + unittest;
      }}
    </script>
    '''

        with open(args.htmlfile, 'r', encoding='utf-8') as f:
            html_text = f.read()

        pattern = re.compile(
            r'(<main>.*?<!-- before CONTENT -->)(.*?)(<!-- after CONTENT -->.*?</main>)',
            re.DOTALL | re.IGNORECASE
        )
        updated_html = pattern.sub(
            lambda m: m.group(1) + '\n\n' + new_content + '\n\n' + m.group(3),
            html_text
        )

        with open(args.htmlfile, 'w', encoding='utf-8') as f:
            f.write(updated_html)


    if __name__ == '__main__':
        main()
    PYEOF

    python3 update_html.py --filelist unittest_file_list.txt --htmlfile unittests.html

    echo "Upload updated unittests.html back to remote..."
    rsync -e "ssh -o StrictHostKeyChecking=yes" unittests.html \
      "$(SF_RSYNC_USER)"@$(SF_HOST):$(PROJWEBDIR)/unittests.html
  env:
    SF_RSYNC_USER: $(SF_RSYNC_USER)
  displayName: 'Fetch, Update and Upload Unittests.html'
